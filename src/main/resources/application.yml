server:
  port: 8080

spring:
  application:
    name: fleetfix-backend

  datasource:
    url: jdbc:postgresql://fleetfix.cbaaaqcugyzy.ap-south-1.rds.amazonaws.com:5432/postgres
    username: postgres
    password: vasu@1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  jackson:
    default-property-inclusion: non_null

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

fleetfix:
  jwt:
    secret: ${JWT_SECRET:ZmxlZXRmaXgtc2VjcmV0LWtleS1mb3ItY29sbGVnZS1wcm9qZWN0LWp3dC1zaWduaW5nLTIwMjY=}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.fleetfix.backend: DEBUG
    org.springframework.security: INFO
