server:
  port: 8080

spring:
  application:
    name: fleetfix-backend

  datasource:
    url: jdbc:mysql://localhost:3306/fleetfix_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: Santhosh@3336
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  jackson:
    default-property-inclusion: non_null

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

fleetfix:
  jwt:
    secret: ${JWT_SECRET:ZmxlZXRmaXgtc2VjcmV0LWtleS1mb3ItY29sbGVnZS1wcm9qZWN0LWp3dC1zaWduaW5nLTIwMjY=}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    com.fleetfix.backend: DEBUG
    org.springframework.security: INFO
